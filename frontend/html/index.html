<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeeLab - Catálogo</title>
    <link href="../style.css" rel="stylesheet">
    <script src="../js/productos.js" type="module" defer></script>
</head>

<body class="bg-layout">

    <header class="topbar">
        <div class="topbar-brand">TeeLab</div>
        <nav>
            <a href="carrito.html" class="btn-nav">
                <span class="icon"></span> Mi Carrito
            </a>
        </nav>
    </header>

    <main class="catalog-layout">
        <aside id="panel-filtros" class="sidebar-filtros">
            <h3 class="sidebar-title">Filtros</h3>

            <div class="form-group">
                <label for="buscar-texto">Buscar producto</label>
                <input type="text" id="buscar-texto" class="input-moderno" placeholder="Ej: Camiseta básica...">
            </div>

            <div class="form-group">
                <label for="filtro-talla">Talla</label>
                <select id="filtro-talla" class="select-moderno">
                    <option value="">Todas las tallas</option>
                    <option value="XS">XS</option>
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </select>
            </div>

            <div class="form-group">
                <label for="filtro-color">Color</label>
                <select id="filtro-color" class="select-moderno">
                    <option value="">Todos los colores</option>
                    <option value="blanco">Blanco</option>
                    <option value="negro">Negro</option>
                    <option value="rojo">Rojo</option>
                    <option value="azul">Azul</option>
                    <option value="verde">Verde</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ordenar-por">Ordenar por</label>
                <select id="ordenar-por" class="select-moderno">
                    <option value="">Destacados</option>
                    <option value="precio_asc">Precio: Menor a Mayor</option>
                    <option value="precio_desc">Precio: Mayor a Menor</option>
                    <option value="nombre_asc">Nombre: A - Z</option>
                    <option value="nombre_desc">Nombre: Z - A</option>
                </select>
            </div>

            <button id="btn-aplicar-filtros" class="btn-primary w-full" type="button">Aplicar Filtros</button>
            <button id="btn-limpiar-filtros" class="btn-primary w-full" type="button">Limpiar Filtros</button>
        </aside>

        <section id="contenedor-productos" class="grid-productos"></section>
    </main>

</body>

</html>
